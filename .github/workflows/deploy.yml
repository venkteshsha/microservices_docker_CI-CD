name: CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Docker Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Backend
      run: |
        docker build -t venkteshsha/micro-backend ./backend
        docker push venkteshsha/micro-backend

    - name: Build Frontend
      run: |
        docker build -t venkteshsha/micro-frontend ./frontend
        docker push venkteshsha/micro-frontend

    - name: Deploy to Server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd /home/ubuntu/microservices_docker_CI-CD
          sudo docker-compose down
          sudo docker-compose pull
          sudo docker-compose up -d
