name: CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Docker Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🔥 Build Backend (NO CACHE)
    - name: Build Backend
      run: |
        docker build --no-cache -t venkteshsha/micro-backend ./backend
        docker push venkteshsha/micro-backend

    # 🔥 Build Frontend (NO CACHE)
    - name: Build Frontend
      run: |
        docker build --no-cache -t venkteshsha/micro-frontend ./frontend
        docker push venkteshsha/micro-frontend

    # 🚀 Deploy to Server
    - name: Deploy to Server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd /home/ubuntu/microservices_docker_CI-CD

          # Remove old containers if exist
          sudo docker rm -f backend_app || true
          sudo docker rm -f frontend_app || true

          # Stop old services
          sudo docker-compose down

          # Pull latest images
          sudo docker-compose pull

          # Start fresh containers
          sudo docker-compose up -d
